project:
  name: Technology-Transfer-Starter
  package:
    name: Technology Transfer Starter
    api_version: "57.0"
    namespace: techstarter
  git:
    default_branch: "main"
    repo_url: https://github.com/SalesforceLabs/Technology-Transfer-Starter
  source_format: sfdx

tasks:
  # Default Configuration for BuiltIn Tasks
  run_tests:
    options:
      required_org_code_coverage_percent: 75

  deploy:
    options:
      path: force-app

  # Configuration for Snowfakery Dataset Deployment
  extract_dataset:
    options:
      inject_namespaces: true
      drop_missing_schema: True

  load_dataset:
    options:
      inject_namespaces: false
      drop_missing_schema: True

  delete_data:
    options:
      objects:
        - Entitlement
        - IP_Inventor__c
        - Applicant__c
        - TrademarkIPAssociation__c
        - Campaign
        - Opportunity
        - IP__c
        - Contact
        - Trademark_Classes__c
        - Contract
        - Account

  # Package Install - Check the version_id is the latest from the sfdx-project.json file
  update_dependencies:
    options:
      dependencies:
        - version_id: 04tDm000000Da7ZIAS

flows:
  config_dev:
    steps:
      3:
        flow: assign_perms

  config_qa:
    steps:
      3:
        flow: assign_perms

  assign_perms:
    steps:
      1:
        task: assign_permission_sets
        options:
          api_names:
            - Technology_Transfer_Starter_Visa_Management
            - Technology_Transfer_Starter_Permission
            - Technology_Transfer_Starter_Space_Manager
            - Technology_Transfer_Starter_Mentoring_Manager

orgs:
  scratch:
    dev:
      config_file: orgs/dev.json
      days: 30
